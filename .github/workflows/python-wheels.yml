# Python wheels for agx-py, published to PyPI on tag push.
#
# Matrix: linux-x86_64, linux-aarch64, macos-arm64, windows-x86_64.
# Uses maturin-action for cross-compilation and consistent manylinux
# policies. abi3-py310 means one wheel per platform (not per Python
# minor version), cutting the matrix down substantially.
#
# Security review: no untrusted `github.event.*` input is consumed
# in `run:` commands. The only `secrets.*` usage threads through
# `env:` into maturin-action's MATURIN_PYPI_TOKEN param, which is
# the documented safe pattern.
#
# Trigger: push of a tag matching `v*` (e.g. v0.2.0). Also exposed
# as `workflow_dispatch` so the maintainer can build wheels without
# tagging, to spot-check the matrix before shipping.
#
# Secrets required for PyPI publish:
#   PYPI_API_TOKEN — scoped to the `agx` project on PyPI.
# Or use Trusted Publishing (OIDC) — see maturin docs. This
# workflow uses API-token mode for simplicity.

name: python-wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: PyO3/maturin-action@v1
        with:
          manylinux: auto
          target: x86_64-unknown-linux-gnu
          args: --release --out dist --manifest-path crates/agx-py/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist

  linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: PyO3/maturin-action@v1
        with:
          manylinux: auto
          target: aarch64-unknown-linux-gnu
          args: --release --out dist --manifest-path crates/agx-py/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-aarch64
          path: dist

  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --out dist --manifest-path crates/agx-py/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: dist

  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist --manifest-path crates/agx-py/Cargo.toml
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-x86_64
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/agx-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [linux-x86_64, linux-aarch64, macos-arm64, windows-x86_64, sdist]
    environment: pypi
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
