[package]
name = "agx"
version = "0.1.0"
edition = "2024"
description = "Step-through debugger for AI agent execution traces"
license = "MIT OR Apache-2.0"

[dependencies]
ratatui = { version = "0.30", default-features = false, features = ["crossterm"] }
crossterm = "0.29"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
arboard = "3"

[dev-dependencies]
tempfile = "3"
