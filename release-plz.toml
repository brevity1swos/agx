[workspace]
changelog_config = "cliff.toml"
allow_dirty = true
git_release_enable = true
git_tag_enable = true
release_commits = "^(feat|fix|perf|refactor|docs?\\(readme\\))[(:!]"

# agx-tui is the user-facing binary crate; agx-core is the pure
# parser library reused by agx-py, agx-wasm, and any external
# eval-harness consumer. Both publish to crates.io.
#
# `agx` and `agx-cli` are both taken on crates.io by unrelated
# projects (agx-cli is the photo-editing CLI for agx-photo), so
# the binary crate publishes as `agx-tui`. The binary that users
# actually invoke remains `agx`.
#
# agx-py and agx-wasm have publish = false in their own Cargo.toml
# — they ship to PyPI via maturin and to npm via wasm-pack
# respectively, not to crates.io. agx-mcp is the local MCP-server
# bin reused only inside this workspace and stays unpublished too.
[[package]]
name = "agx-core"
publish = true

[[package]]
name = "agx-tui"
publish = true
